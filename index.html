<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector y Captura - Hydrovec</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Mismos estilos de diseño limpio */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; padding: 15px; margin: 0; }
        .contenedor { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h1 { color: #004a99; text-align: center; border-bottom: 3px solid #004a99; padding-bottom: 10px; font-size: 1.5rem; margin-top: 0; }
        #seccion-escaner p { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 15px; }
        #reader { width: 100%; margin-bottom: 20px; border-radius: 8px; overflow: hidden; background: #000; }
        .btn { display: block; width: 100%; padding: 15px; background: #004a99; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; text-align: center; }
        .btn-success { background: #28a745; margin-top: 30px; }
        .btn-cancel { background: #dc3545; }
        #resultado, #formulario-captura { display: none; }
        .info-cabecera { background: #f0f7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #004a99; }
        .info-cabecera h2, .info-cabecera h3 { margin: 0 0 5px 0; color: #004a99; text-align: center; }
        .info-cabecera p { margin: 6px 0; font-size: 0.95rem; display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 4px; }
        .tabla-contenedor { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 0.85rem; }
        th { background-color: #004a99; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        td:first-child { text-align: left; font-weight: bold; color: #004a99; }
        .error { color: #d9534f; background: #fdf7f7; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #d9534f; }
        
        /* Estilos nuevos para el formulario de captura */
        .input-group { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #28a745; }
        .input-group strong { display: block; margin-bottom: 8px; color: #333; }
        .input-control { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>HYDROVEC - Captura</h1>

    <div id="seccion-escaner">
        <p>Apunta al código QR para buscar el equipo.</p>
        <div id="reader"></div>
    </div>

    <div id="resultado">
        <div id="datos-ficha"></div>
        <button class="btn btn-success" onclick="abrirFormulario()">📝 Crear Nuevo Registro</button>
        <button class="btn" onclick="reiniciarEscaner()">Escanear otro equipo</button>
    </div>

    <div id="formulario-captura">
        <div class="info-cabecera" id="cabecera-form"></div>
        <div id="campos-dinamicos"></div>
        <button class="btn btn-success" onclick="guardarDatos()">💾 Guardar en Base de Datos</button>
        <button class="btn btn-cancel" onclick="cancelarFormulario()">❌ Cancelar</button>
    </div>
</div>

<script>
    const SHEET_ID = '1c6oCi27Vneu7y7GsOxDszICAunDAqegFrMqA_cVnRsQ';
    const URL_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=BASEDATOS`;
    
    let html5QrCode;
    
    // Variables globales para recordar la información al abrir el formulario
    let headersGlobales = [];
    let valoresGlobales = [];
    let clienteGlobal = "";
    let equipoGlobal = "";

    window.onload = () => {
        html5QrCode = new Html5Qrcode("reader");
        arrancarCamara();
    };

    function arrancarCamara() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, disableFlip: false }, alEscanearExito, () => {})
        .catch(err => {
            document.getElementById('reader').innerHTML = `<div class="error">Error de Cámara.</div>`;
        });
    }

    function alEscanearExito(textoDecodificado) {
        html5QrCode.stop().then(() => {
            const partes = textoDecodificado.split('|');
            if (partes.length === 2) {
                buscarEnBaseDeDatos(partes[0].trim(), partes[1].trim());
            } else {
                mostrarError("QR no válido.");
            }
        });
    }

    async function buscarEnBaseDeDatos(cliente, equipo) {
        document.getElementById('seccion-escaner').style.display = 'none';
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('datos-ficha').innerHTML = `<div style="text-align:center; padding:20px;">Buscando... ⏳</div>`;

        try {
            const respuesta = await fetch(URL_CSV);
            const datosCSV = await respuesta.text();
            const filas = datosCSV.split("\n").map(f => f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim()));
            const encabezados = filas[0];
            
            const registro = filas.find(f => f[encabezados.indexOf("Cliente")] === cliente && f[encabezados.indexOf("Equipos")] === equipo);

            if (registro) {
                // Guardamos los datos para usarlos en el formulario
                headersGlobales = encabezados;
                valoresGlobales = registro;
                clienteGlobal = cliente;
                equipoGlobal = equipo;
                
                renderizarFicha();
            } else {
                mostrarError("Equipo no encontrado.");
            }
        } catch (error) {
            mostrarError("Error de conexión.");
        }
    }

    function getVal(col) {
        const idx = headersGlobales.indexOf(col);
        return (idx !== -1 && valoresGlobales[idx] && valoresGlobales[idx] !== "") ? valoresGlobales[idx] : "N/A";
    }

    function renderizarFicha() {
        let html = `
            <div class="info-cabecera">
                <h2>${clienteGlobal}</h2>
                <h3>Equipo: ${equipoGlobal}</h3>
                <p><span>🏷️ Activo:</span> <strong>${getVal("# Activo")}</strong></p>
                <p><span>👨‍🔧 Técnico:</span> <strong>${getVal("Tecnico Responsable")}</strong></p>
            </div>
            <div class="tabla-contenedor">
                <table>
                    <tr><th>Parámetro</th><th>Lím. Inf.</th><th>Lím. Sup.</th></tr>`;

        for (let i = 1; i <= 47; i++) {
            const param = getVal(`Parametro${i}`);
            if (param !== "N/A") {
                html += `<tr><td>${param}</td><td>${getVal(`LimiteInferior${i}`)}</td><td>${getVal(`LimiteSuperior${i}`)}</td></tr>`;
            }
        }
        html += `</table></div>`;
        document.getElementById('datos-ficha').innerHTML = html;
    }

    // --- SECCIÓN NUEVA: LÓGICA DEL FORMULARIO ---

    function abrirFormulario() {
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('formulario-captura').style.display = 'block';

        document.getElementById('cabecera-form').innerHTML = `
            <h2>Nuevo Registro: ${clienteGlobal}</h2>
            <h3>${equipoGlobal}</h3>
            <p>Ingresa los resultados para los parámetros configurados.</p>
        `;

        let htmlCampos = "";

        // Generamos un bloque de input SOLO para los parámetros que sí existen
        for (let i = 1; i <= 47; i++) {
            const param = getVal(`Parametro${i}`);
            if (param !== "N/A") {
                const unidad = getVal(`Unidad${i}`);
                htmlCampos += `
                    <div class="input-group">
                        <strong>${i}. ${param} <small>(${unidad !== "N/A" ? unidad : ""})</small></strong>
                        <input type="text" class="input-control" id="resultado_${i}" placeholder="Escribe el resultado aquí">
                        <input type="text" class="input-control" id="comentario_${i}" placeholder="Comentarios (Opcional)">
                    </div>
                `;
            }
        }
        document.getElementById('campos-dinamicos').innerHTML = htmlCampos;
    }

    function cancelarFormulario() {
        document.getElementById('formulario-captura').style.display = 'none';
        document.getElementById('resultado').style.display = 'block';
    }

    function guardarDatos() {
        alert("¡Interfaz de captura lista!\n\nPara que estos datos viajen y se guarden en tu hoja de 'registro' en Google Sheets, necesitamos conectarlo con Google Apps Script.");
    }

    function mostrarError(mensaje) {
        document.getElementById('seccion-escaner').style.display = 'none';
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('datos-ficha').innerHTML = `<div class="error">${mensaje}</div>`;
    }

    function reiniciarEscaner() {
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('seccion-escaner').style.display = 'block';
        arrancarCamara();
    }
</script>
</body>
</html>
